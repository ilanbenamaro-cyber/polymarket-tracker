name: Update market data

on:
  schedule:
    - cron: '0 14 * * *' # 9:00 AM ET (EDT) — daily snapshot only
    - cron: '30 14 * * 1-5' # 9:30 AM ET (EDT) — market open + email
    - cron: '0 21 * * 1-5' # 4:00 PM ET (EDT) — market close + email
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        type: choice
        options: [snapshot, market-open, market-close]
        default: snapshot

permissions:
  contents: write

# Serialize runs that commit to main so two snapshots never race on the push.
# cancel-in-progress:false → a queued run waits for the in-flight one to finish
# (and push) instead of being cancelled, so no snapshot is dropped.
concurrency:
  group: snapshot-commit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so a rebase onto an advanced origin/main always has the
          # merge base (a shallow clone can reject the rebase).
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "30 14 * * 1-5" ]; then
            echo "MODE=market-open" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "MODE=market-close" >> "$GITHUB_ENV"
          else
            echo "MODE=snapshot" >> "$GITHUB_ENV"
          fi

      - name: Build canonical snapshot + render API
        run: node scripts/snapshot.js

      - name: Commit API + baked dashboard
        run: |
          set -euo pipefail
          git config user.name "polymarket-tracker[bot]"
          git config user.email "polymarket-tracker@users.noreply.github.com"
          git add docs/api/v1 docs/index.html docs/note.html

          # Nothing changed (e.g. identical re-run) → succeed without a commit.
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: snapshot $(date -u +%Y-%m-%d\ %H:%M\ UTC)"

          # Concurrency-safe push. The remote may have advanced after this runner
          # checked out main (another snapshot run or a human push). BEFORE each push
          # we fetch + rebase our one commit onto the latest origin/main, then push;
          # if the remote races again between the rebase and the push, we retry.
          # On a generated-file conflict prefer OUR freshly-built artifacts (-X theirs:
          # during rebase "theirs" = the commit being replayed, i.e. this snapshot) —
          # the just-built files are the authoritative current state. The concurrency
          # group above already keeps two snapshot runs from overlapping, so this
          # primarily integrates non-snapshot pushes (rarely a real conflict).
          attempt=0
          max=5
          while true; do
            attempt=$((attempt + 1))
            # Fetch main and rebase onto FETCH_HEAD (always set by `fetch origin main`,
            # independent of whether the origin/main tracking ref is configured).
            git fetch origin main
            if ! git rebase -X theirs FETCH_HEAD; then
              git rebase --abort || true
              echo "Rebase onto origin/main failed."
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              break
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "Push still racing after $attempt attempts — failing."
              exit 1
            fi
            echo "Push rejected (attempt $attempt) — remote advanced again; retrying."
            sleep $(( (RANDOM % 4) + 2 ))
          done

      - name: Send emails
        if: env.MODE == 'market-open' || env.MODE == 'market-close'
        run: node scripts/send-emails.js "$MODE" docs/data.json
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
